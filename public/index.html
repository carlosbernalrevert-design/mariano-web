<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rIAjoy - MarIAno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #F8FAFC;
      --primary: #1E3A8A;
      --accent-blue: #2563EB;
      --card-bg: #FFFFFF;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --border-color: #E2E8F0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      background: var(--card-bg);
      max-width: 680px;
      width: 100%;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      border: 1px solid var(--border-color);
      text-align: center;
      position: relative;
    }

    .container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--primary);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
    }

    .rajoy-avatar {
      width: 150px;
      height: 150px;
      max-width: 150px;
      max-height: 150px;
      margin: 0 auto 12px auto;
      display: block;
    }

    .brand-title {
      font-family: 'Merriweather', serif;
      font-weight: 900;
      font-size: 26px;
      color: var(--primary);
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Merriweather', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    input[type="url"] {
      width: 100%;
      padding: 16px 20px;
      font-size: 15px;
      font-family: 'Open Sans', sans-serif;
      border: 1px solid #CBD5E1;
      border-radius: 10px;
      outline: none;
      transition: all 0.2s ease;
      background-color: #FFFFFF;
      color: var(--text-main);
    }

    input[type="url"]:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .btn-submit {
      width: 100%;
      background-color: var(--primary);
      color: #FFFFFF;
      font-family: 'Open Sans', sans-serif;
      font-weight: 700;
      font-size: 16px;
      padding: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .btn-submit:hover {
      background-color: #1D4ED8;
    }

    .btn-submit:disabled {
      background-color: #475569;
      cursor: not-allowed;
    }

    .btn-submit.loading {
      animation: pulseText 1.2s infinite ease-in-out;
    }

    @keyframes pulseText {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .result-box {
      margin-top: 32px;
      text-align: left;
      display: none;
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 28px;
    }

    .result-header {
      font-family: 'Merriweather', serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #E2E8F0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .result-content {
      font-family: 'Merriweather', serif;
      font-size: 16px;
      line-height: 1.8;
      color: #334155;
      white-space: pre-wrap;
    }

    .error-box {
      margin-top: 24px;
      padding: 16px;
      background-color: #FEF2F2;
      border: 1px solid #FECACA;
      color: #991B1B;
      border-radius: 10px;
      display: none;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Caricatura basada exclusivamente en la foto image_810fae.jpg (Gafas metálicas y Barba blanca) -->
    <svg class="rajoy-avatar" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Gafas de montura metálica al estilo de la foto -->
      <g id="gafas-foto">
        <!-- Lente izquierda -->
        <path d="M 42 70 C 42 62, 85 62, 85 70 C 85 85, 42 85, 42 70 Z" stroke="#334155" stroke-width="3.5" fill="none"/>
        <!-- Lente derecha -->
        <path d="M 115 70 C 115 62, 158 62, 158 70 C 158 85, 115 85, 115 70 Z" stroke="#334155" stroke-width="3.5" fill="none"/>
        <!-- Puente nasal central -->
        <path d="M 85 68 Q 100 64 115 68" stroke="#334155" stroke-width="3.5" fill="none"/>
        <!-- Patillas laterales -->
        <line x1="25" y1="67" x2="42" y2="69" stroke="#334155" stroke-width="3"/>
        <line x1="158" y1="69" x2="175" y2="67" stroke="#334155" stroke-width="3"/>
      </g>

      <!-- Barba blanca y canosa calcada de la sonrisa de la foto -->
      <g id="barba-blanca-foto">
        <!-- Bigote recortado sobre el labio superior -->
        <path d="M 72 108 Q 100 102 128 108 C 122 118, 78 118, 72 108 Z" fill="#E2E8F0" stroke="#94A3B8" stroke-width="1.5"/>
        <path d="M 80 108 Q 100 105 120 108 C 115 115, 85 115, 80 108 Z" fill="#FFFFFF"/>

        <!-- Cuerpo principal de la barba canosa -->
        <path d="M 48 95 C 45 140, 68 175, 100 175 C 132 175, 155 140, 152 95 C 138 115, 132 138, 100 138 C 68 138, 62 115, 48 95 Z" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="2"/>
        
        <!-- Sombra y volumen canoso inferior -->
        <path d="M 58 115 C 56 142, 75 168, 100 168 C 125 168, 144 142, 142 115 C 130 132, 120 148, 100 148 C 80 148, 70 132, 58 115 Z" fill="#E2E8F0"/>
        <path d="M 75 130 C 72 152, 85 165, 100 165 C 115 165, 128 152, 125 130 C 118 145, 110 155, 100 155 C 90 155, 82 145, 75 130 Z" fill="#FFFFFF"/>
      </g>
    </svg>

    <div class="brand-title">MarIAno</div>
    <h1>La herramienta que aclara lo que ya estaba claro, y que además lo vuelve a aclarar por si fuera necesario.</h1>
    
    <p class="subtitle">Trae un link cualquiera y MarIAno te explica la información para que la entiendas mejor, o no.</p>

    <form id="marIAnoForm">
      <div class="form-group">
        <input 
          type="url" 
          id="newsUrl" 
          placeholder="Pega el link de tu noticia para MarIAnizar" 
          required 
          autocomplete="off"
        />
      </div>
      <button type="submit" id="submitBtn" class="btn-submit">MarlAnizar</button>
    </form>

    <div id="errorBox" class="error-box"></div>

    <div id="resultBox" class="result-box">
      <div id="resultHeader" class="result-header"></div>
      <div id="resultContent" class="result-content"></div>
    </div>

  </div>

  <script>
    const form = document.getElementById('marIAnoForm');
    const input = document.getElementById('newsUrl');
    const submitBtn = document.getElementById('submitBtn');
    const resultBox = document.getElementById('resultBox');
    const resultHeader = document.getElementById('resultHeader');
    const resultContent = document.getElementById('resultContent');
    const errorBox = document.getElementById('errorBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const url = input.value.trim();
      if (!url) return;

      errorBox.style.display = 'none';
      resultBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      submitBtn.textContent = 'pensando en obviedades...';

      try {
        const response = await fetch('/transformar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Ocurrió un error inesperado.');
        }

        resultHeader.textContent = data.header || '';
        resultContent.textContent = data.content || '';
        resultBox.style.display = 'block';

      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        submitBtn.textContent = 'MarlAnizar';
      }
    });
  </script>
</body>
</html>
