<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rIAjoy - MarIAno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #F8FAFC;
      --primary: #1E3A8A;
      --accent-blue: #2563EB;
      --card-bg: #FFFFFF;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --border-color: #E2E8F0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      background: var(--card-bg);
      max-width: 680px;
      width: 100%;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      border: 1px solid var(--border-color);
      text-align: center;
      position: relative;
    }

    .container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--primary);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
    }

    /* Tamaño controlado del SVG */
    .rajoy-avatar {
      width: 140px;
      height: 140px;
      max-width: 140px;
      max-height: 140px;
      margin: 0 auto 12px auto;
      display: block;
    }

    .brand-title {
      font-family: 'Merriweather', serif;
      font-weight: 900;
      font-size: 26px;
      color: var(--primary);
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Merriweather', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    input[type="url"] {
      width: 100%;
      padding: 16px 20px;
      font-size: 15px;
      font-family: 'Open Sans', sans-serif;
      border: 1px solid #CBD5E1;
      border-radius: 10px;
      outline: none;
      transition: all 0.2s ease;
      background-color: #FFFFFF;
      color: var(--text-main);
    }

    input[type="url"]:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .btn-submit {
      width: 100%;
      background-color: var(--primary);
      color: #FFFFFF;
      font-family: 'Open Sans', sans-serif;
      font-weight: 700;
      font-size: 16px;
      padding: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .btn-submit:hover {
      background-color: #1D4ED8;
    }

    .btn-submit:disabled {
      background-color: #475569;
      cursor: not-allowed;
    }

    .btn-submit.loading {
      animation: pulseText 1.2s infinite ease-in-out;
    }

    @keyframes pulseText {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .result-box {
      margin-top: 32px;
      text-align: left;
      display: none;
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 28px;
    }

    .result-header {
      font-family: 'Merriweather', serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #E2E8F0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .result-content {
      font-family: 'Merriweather', serif;
      font-size: 16px;
      line-height: 1.8;
      color: #334155;
      white-space: pre-wrap;
    }

    .error-box {
      margin-top: 24px;
      padding: 16px;
      background-color: #FEF2F2;
      border: 1px solid #FECACA;
      color: #991B1B;
      border-radius: 10px;
      display: none;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Nueva caricatura minimalista: Solo gafas, barba y puro (sin cara) -->
    <svg class="rajoy-avatar" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Gafas de pasta sobria -->
      <g id="gafas">
        <rect x="30" y="38" width="34" height="22" rx="4" stroke="#0F172A" stroke-width="4" fill="none"/>
        <rect x="76" y="38" width="34" height="22" rx="4" stroke="#0F172A" stroke-width="4" fill="none"/>
        <line x1="64" y1="46" x2="76" y2="46" stroke="#0F172A" stroke-width="4"/>
        <line x1="20" y1="44" x2="30" y2="44" stroke="#0F172A" stroke-width="3"/>
        <line x1="110" y1="44" x2="120" y2="44" stroke="#0F172A" stroke-width="3"/>
      </g>

      <!-- Barba canosa icónica -->
      <g id="barba">
        <path d="M 38 68 C 38 102, 102 102, 102 68 C 94 94, 46 94, 38 68 Z" fill="#CBD5E1" stroke="#1E293B" stroke-width="2.5"/>
        <path d="M 50 74 C 58 98, 82 98, 90 74 C 82 90, 58 90, 50 74 Z" fill="#94A3B8" opacity="0.5"/>
      </g>

      <!-- Puro habano encendido con humo -->
      <g id="puro">
        <rect x="72" y="70" width="36" height="9" rx="2.5" fill="#78350F" stroke="#1E293B" stroke-width="2" transform="rotate(-12 72 70)"/>
        <rect x="79" y="69" width="5" height="9.5" fill="#F59E0B" transform="rotate(-12 79 69)"/>
        <ellipse cx="109" cy="62" rx="2.5" ry="4" fill="#EF4444"/>
        <path d="M 110 58 Q 116 46 111 38 T 118 24" stroke="#94A3B8" stroke-width="2.5" stroke-linecap="round" fill="none" opacity="0.75"/>
      </g>
    </svg>

    <div class="brand-title">MarIAno</div>
    <h1>La herramienta que aclara lo que ya estaba claro, y que además lo vuelve a aclarar por si fuera necesario.</h1>
    
    <p class="subtitle">Trae un link cualquiera y MarIAno te explica la información para que la entiendas mejor, o no.</p>

    <form id="marIAnoForm">
      <div class="form-group">
        <input 
          type="url" 
          id="newsUrl" 
          placeholder="Pega el link de tu noticia para MarIAnizar" 
          required 
          autocomplete="off"
        />
      </div>
      <button type="submit" id="submitBtn" class="btn-submit">MarlAnizar</button>
    </form>

    <div id="errorBox" class="error-box"></div>

    <div id="resultBox" class="result-box">
      <div id="resultHeader" class="result-header"></div>
      <div id="resultContent" class="result-content"></div>
    </div>

  </div>

  <script>
    const form = document.getElementById('marIAnoForm');
    const input = document.getElementById('newsUrl');
    const submitBtn = document.getElementById('submitBtn');
    const resultBox = document.getElementById('resultBox');
    const resultHeader = document.getElementById('resultHeader');
    const resultContent = document.getElementById('resultContent');
    const errorBox = document.getElementById('errorBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const url = input.value.trim();
      if (!url) return;

      errorBox.style.display = 'none';
      resultBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      submitBtn.textContent = 'pensando en obviedades...';

      try {
        const response = await fetch('/transformar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Ocurrió un error inesperado.');
        }

        resultHeader.textContent = data.header || '';
        resultContent.textContent = data.content || '';
        resultBox.style.display = 'block';

      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
      } opacity: 1;
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        submitBtn.textContent = 'MarlAnizar';
    });
  </script>
</body>
</html>
