<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rIAjoy - MarIAno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #F8FAFC;
      --primary: #1E3A8A;
      --accent-blue: #2563EB;
      --card-bg: #FFFFFF;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --border-color: #E2E8F0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      background: var(--card-bg);
      max-width: 680px;
      width: 100%;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      border: 1px solid var(--border-color);
      text-align: center;
      position: relative;
    }

    .container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--primary);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
    }

    .rajoy-avatar {
      width: 170px;
      height: 170px;
      max-width: 170px;
      max-height: 170px;
      margin: 0 auto 12px auto;
      display: block;
      filter: drop-shadow(0px 4px 6px rgba(15, 23, 42, 0.08));
    }

    .brand-title {
      font-family: 'Merriweather', serif;
      font-weight: 900;
      font-size: 26px;
      color: var(--primary);
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Merriweather', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    input[type="url"] {
      width: 100%;
      padding: 16px 20px;
      font-size: 15px;
      font-family: 'Open Sans', sans-serif;
      border: 1px solid #CBD5E1;
      border-radius: 10px;
      outline: none;
      transition: all 0.2s ease;
      background-color: #FFFFFF;
      color: var(--text-main);
    }

    input[type="url"]:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .btn-submit {
      width: 100%;
      background-color: var(--primary);
      color: #FFFFFF;
      font-family: 'Open Sans', sans-serif;
      font-weight: 700;
      font-size: 16px;
      padding: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .btn-submit:hover {
      background-color: #1D4ED8;
    }

    .btn-submit:disabled {
      background-color: #475569;
      cursor: not-allowed;
    }

    .btn-submit.loading {
      animation: pulseText 1.2s infinite ease-in-out;
    }

    @keyframes pulseText {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .result-box {
      margin-top: 32px;
      text-align: left;
      display: none;
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 28px;
    }

    .result-header {
      font-family: 'Merriweather', serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #E2E8F0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .result-content {
      font-family: 'Merriweather', serif;
      font-size: 16px;
      line-height: 1.8;
      color: #334155;
      white-space: pre-wrap;
    }

    .error-box {
      margin-top: 24px;
      padding: 16px;
      background-color: #FEF2F2;
      border: 1px solid #FECACA;
      color: #991B1B;
      border-radius: 10px;
      display: none;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Caricatura hiperrealista en vector de la foto Captura de pantalla 2026-07-09 a las 11.02.24.png -->
    <svg class="rajoy-avatar" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Gradientes para la montura metálica -->
        <linearGradient id="metalFrame" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#475569"/>
          <stop offset="50%" stop-color="#0F172A"/>
          <stop offset="100%" stop-color="#334155"/>
        </linearGradient>

        <!-- Gradiente de reflejo de cristal -->
        <linearGradient id="glassReflect" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
          <stop offset="30%" stop-color="#38BDF8" stop-opacity="0.15"/>
          <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
        </linearGradient>

        <!-- Gradientes para la profundidad de la barba -->
        <radialGradient id="beardBase" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#FFFFFF"/>
          <stop offset="70%" stop-color="#F1F5F9"/>
          <stop offset="100%" stop-color="#CBD5E1"/>
        </radialGradient>

        <linearGradient id="beardShadow" x1="50%" y1="0%" x2="50%" y2="100%">
          <stop offset="0%" stop-color="#94A3B8" stop-opacity="0.4"/>
          <stop offset="100%" stop-color="#475569" stop-opacity="0.1"/>
        </linearGradient>
      </defs>

      <!-- BARBA Y BIGOTE REALISTAS -->
      <g id="barba-hiperrealista">
        <!-- Base sombreada de barbilla y mandíbula -->
        <path d="M 40 85 C 36 138, 60 182, 100 182 C 140 182, 164 138, 160 85 C 144 112, 132 138, 100 138 C 68 138, 56 112, 40 85 Z" fill="url(#beardShadow)"/>
        
        <!-- Masa principal de la barba con volumen -->
        <path d="M 44 88 C 41 135, 62 178, 100 178 C 138 178, 159 135, 156 88 C 142 112, 130 135, 100 135 C 70 135, 58 112, 44 88 Z" fill="url(#beardBase)"/>

        <!-- Filamentos y matices de canas (Líneas orgánicas finas) -->
        <g stroke="#94A3B8" stroke-width="1" opacity="0.6" stroke-linecap="round">
          <path d="M 52 105 C 50 128, 64 150, 80 162"/>
          <path d="M 148 105 C 150 128, 136 150, 120 162"/>
          <path d="M 60 120 C 62 142, 78 162, 100 168"/>
          <path d="M 140 120 C 138 142, 122 162, 100 168"/>
          <path d="M 72 135 C 80 152, 90 160, 100 162"/>
          <path d="M 128 135 C 120 152, 110 160, 100 162"/>
        </g>

        <!-- Bigote detallado con corte anatómico -->
        <path d="M 66 100 C 82 95, 118 95, 134 100 C 128 114, 72 114, 66 100 Z" fill="url(#beardBase)" stroke="#CBD5E1" stroke-width="1"/>
        <path d="M 70 100 Q 100 97 130 100 C 124 108, 76 108, 70 100 Z" fill="#FFFFFF"/>
        
        <!-- Textura superior del bigote -->
        <path d="M 74 100 Q 100 105 126 100" stroke="#64748B" stroke-width="1.2" stroke-dasharray="2 2" opacity="0.5"/>
      </g>

      <!-- GAFAS METÁLICAS CON VOLUMEN Y CRISTALES -->
      <g id="gafas-hiperrealistas">
        <!-- Sombras proyectadas de las gafas -->
        <rect x="36" y="58" width="48" height="28" rx="7" fill="#0F172A" opacity="0.12"/>
        <rect x="116" y="58" width="48" height="28" rx="7" fill="#0F172A" opacity="0.12"/>

        <!-- Cristal izquierdo con reflejo -->
        <rect x="36" y="56" width="48" height="28" rx="7" fill="url(#glassReflect)"/>
        <!-- Montura izquierda -->
        <rect x="36" y="56" width="48" height="28" rx="7" stroke="url(#metalFrame)" stroke-width="3" fill="none"/>

        <!-- Cristal derecho con reflejo -->
        <rect x="116" y="56" width="48" height="28" rx="7" fill="url(#glassReflect)"/>
        <!-- Montura derecha -->
        <rect x="116" y="56" width="48" height="28" rx="7" stroke="url(#metalFrame)" stroke-width="3" fill="none"/>

        <!-- Puente nasal doble realista -->
        <path d="M 84 63 Q 100 60 116 63" stroke="url(#metalFrame)" stroke-width="2.8" fill="none"/>
        <path d="M 86 67 Q 100 65 114 67" stroke="#94A3B8" stroke-width="1.5" fill="none"/>

        <!-- Patillas laterales articuladas -->
        <path d="M 16 62 L 36 62" stroke="url(#metalFrame)" stroke-width="3" stroke-linecap="round"/>
        <path d="M 164 62 L 184 62" stroke="url(#metalFrame)" stroke-width="3" stroke-linecap="round"/>
        <circle cx="36" cy="62" r="2" fill="#64748B"/>
        <circle cx="164" cy="62" r="2" fill="#64748B"/>

        <!-- Destellos de luz diagonal sobre los cristales -->
        <path d="M 42 58 L 62 82" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
        <path d="M 122 58 L 142 82" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
      </g>
    </svg>

    <div class="brand-title">MarIAno</div>
    <h1>La herramienta que aclara lo que ya estaba claro, y que además lo vuelve a aclarar por si fuera necesario.</h1>
    
    <p class="subtitle">Trae un link cualquiera y MarIAno te explica la información para que la entiendas mejor, o no.</p>

    <form id="marIAnoForm">
      <div class="form-group">
        <input 
          type="url" 
          id="newsUrl" 
          placeholder="Pega el link de tu noticia para MarIAnizar" 
          required 
          autocomplete="off"
        />
      </div>
      <button type="submit" id="submitBtn" class="btn-submit">MarlAnizar</button>
    </form>

    <div id="errorBox" class="error-box"></div>

    <div id="resultBox" class="result-box">
      <div id="resultHeader" class="result-header"></div>
      <div id="resultContent" class="result-content"></div>
    </div>

  </div>

  <script>
    const form = document.getElementById('marIAnoForm');
    const input = document.getElementById('newsUrl');
    const submitBtn = document.getElementById('submitBtn');
    const resultBox = document.getElementById('resultBox');
    const resultHeader = document.getElementById('resultHeader');
    const resultContent = document.getElementById('resultContent');
    const errorBox = document.getElementById('errorBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const url = input.value.trim();
      if (!url) return;

      errorBox.style.display = 'none';
      resultBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      submitBtn.textContent = 'pensando en obviedades...';

      try {
        const response = await fetch('/transformar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Ocurrió un error inesperado.');
        }

        resultHeader.textContent = data.header || '';
        resultContent.textContent = data.content || '';
        resultBox.style.display = 'block';

      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        submitBtn.textContent = 'MarlAnizar';
      }
    });
  </script>
</body>
</html>
