<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rIAjoy - MarIAno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #F8FAFC;
      --primary: #1E3A8A;
      --accent-blue: #2563EB;
      --card-bg: #FFFFFF;
      --text-main: #1E293B;
      --text-muted: #64748B;
      --border-color: #E2E8F0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Open Sans', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      background: var(--card-bg);
      max-width: 680px;
      width: 100%;
      border-radius: 16px;
      padding: 48px 40px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      border: 1px solid var(--border-color);
      text-align: center;
      position: relative;
    }

    .container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: var(--primary);
      border-top-left-radius: 16px;
      border-top-right-radius: 16px;
    }

    .rajoy-avatar {
      width: 160px;
      height: 160px;
      max-width: 160px;
      max-height: 160px;
      margin: 0 auto 12px auto;
      display: block;
    }

    .brand-title {
      font-family: 'Merriweather', serif;
      font-weight: 900;
      font-size: 26px;
      color: var(--primary);
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Merriweather', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.4;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    input[type="url"] {
      width: 100%;
      padding: 16px 20px;
      font-size: 15px;
      font-family: 'Open Sans', sans-serif;
      border: 1px solid #CBD5E1;
      border-radius: 10px;
      outline: none;
      transition: all 0.2s ease;
      background-color: #FFFFFF;
      color: var(--text-main);
    }

    input[type="url"]:focus {
      border-color: var(--accent-blue);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .btn-submit {
      width: 100%;
      background-color: var(--primary);
      color: #FFFFFF;
      font-family: 'Open Sans', sans-serif;
      font-weight: 700;
      font-size: 16px;
      padding: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background-color 0.2s ease, transform 0.1s ease;
    }

    .btn-submit:hover {
      background-color: #1D4ED8;
    }

    .btn-submit:disabled {
      background-color: #475569;
      cursor: not-allowed;
    }

    .btn-submit.loading {
      animation: pulseText 1.2s infinite ease-in-out;
    }

    @keyframes pulseText {
      0% { opacity: 1; }
      50% { opacity: 0.4; }
      100% { opacity: 1; }
    }

    .result-box {
      margin-top: 32px;
      text-align: left;
      display: none;
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 12px;
      padding: 28px;
    }

    .result-header {
      font-family: 'Merriweather', serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #E2E8F0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .result-content {
      font-family: 'Merriweather', serif;
      font-size: 16px;
      line-height: 1.8;
      color: #334155;
      white-space: pre-wrap;
    }

    .error-box {
      margin-top: 24px;
      padding: 16px;
      background-color: #FEF2F2;
      border: 1px solid #FECACA;
      color: #991B1B;
      border-radius: 10px;
      display: none;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Caricatura realista basada en Captura de pantalla 2026-07-09 a las 10.47.37.jpg -->
    <svg class="rajoy-avatar" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Gafas metálicas estilizadas según la foto -->
      <g id="gafas-realistas">
        <!-- Lente izquierda -->
        <rect x="38" y="58" width="46" height="26" rx="6" stroke="#1E293B" stroke-width="2.8" fill="none"/>
        <!-- Lente derecha -->
        <rect x="116" y="58" width="46" height="26" rx="6" stroke="#1E293B" stroke-width="2.8" fill="none"/>
        <!-- Puente nasal doble -->
        <path d="M 84 65 Q 100 62 116 65" stroke="#1E293B" stroke-width="2.5" fill="none"/>
        <path d="M 86 69 Q 100 67 114 69" stroke="#475569" stroke-width="1.8" fill="none"/>
        <!-- Patillas y Bisagras -->
        <path d="M 18 64 L 38 64" stroke="#1E293B" stroke-width="2.5"/>
        <path d="M 162 64 L 182 64" stroke="#1E293B" stroke-width="2.5"/>
        <!-- Reflejo suave en cristales -->
        <line x1="44" y1="62" x2="58" y2="78" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
        <line x1="122" y1="62" x2="136" y2="78" stroke="#94A3B8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
      </g>

      <!-- Barba canosa detallada basada en la sonrisa de la foto -->
      <g id="barba-realista">
        <!-- Bigote recortado característico -->
        <path d="M 68 102 C 82 98, 118 98, 132 102 C 126 114, 74 114, 68 102 Z" fill="#E2E8F0" stroke="#64748B" stroke-width="1.5"/>
        <path d="M 74 102 C 86 100, 114 100, 126 102 C 120 110, 80 110, 74 102 Z" fill="#FFFFFF"/>

        <!-- Masa principal de la barba -->
        <path d="M 44 88 C 40 135, 62 178, 100 178 C 138 178, 160 135, 156 88 C 142 112, 132 136, 100 136 C 68 136, 58 112, 44 88 Z" fill="#F8FAFC" stroke="#94A3B8" stroke-width="2"/>
        
        <!-- Sombra de barbilla y tonos canosos laterales -->
        <path d="M 52 108 C 48 138, 70 170, 100 170 C 130 170, 152 138, 148 108 C 136 128, 122 146, 100 146 C 78 146, 64 128, 52 108 Z" fill="#E2E8F0"/>
        <path d="M 68 126 C 64 148, 80 162, 100 162 C 120 162, 136 148, 132 126 C 124 140, 112 150, 100 150 C 88 150, 76 140, 68 126 Z" fill="#FFFFFF"/>
        
        <!-- Textura de canas inferiores (líneas finas) -->
        <path d="M 85 158 Q 100 168 115 158" stroke="#CBD5E1" stroke-width="2" fill="none"/>
        <path d="M 90 148 Q 100 155 110 148" stroke="#CBD5E1" stroke-width="1.5" fill="none"/>
      </g>
    </svg>

    <div class="brand-title">MarIAno</div>
    <h1>La herramienta que aclara lo que ya estaba claro, y que además lo vuelve a aclarar por si fuera necesario.</h1>
    
    <p class="subtitle">Trae un link cualquiera y MarIAno te explica la información para que la entiendas mejor, o no.</p>

    <form id="marIAnoForm">
      <div class="form-group">
        <input 
          type="url" 
          id="newsUrl" 
          placeholder="Pega el link de tu noticia para MarIAnizar" 
          required 
          autocomplete="off"
        />
      </div>
      <button type="submit" id="submitBtn" class="btn-submit">MarlAnizar</button>
    </form>

    <div id="errorBox" class="error-box"></div>

    <div id="resultBox" class="result-box">
      <div id="resultHeader" class="result-header"></div>
      <div id="resultContent" class="result-content"></div>
    </div>

  </div>

  <script>
    const form = document.getElementById('marIAnoForm');
    const input = document.getElementById('newsUrl');
    const submitBtn = document.getElementById('submitBtn');
    const resultBox = document.getElementById('resultBox');
    const resultHeader = document.getElementById('resultHeader');
    const resultContent = document.getElementById('resultContent');
    const errorBox = document.getElementById('errorBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const url = input.value.trim();
      if (!url) return;

      errorBox.style.display = 'none';
      resultBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.classList.add('loading');
      submitBtn.textContent = 'pensando en obviedades...';

      try {
        const response = await fetch('/transformar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Ocurrió un error inesperado.');
        }

        resultHeader.textContent = data.header || '';
        resultContent.textContent = data.content || '';
        resultBox.style.display = 'block';

      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.classList.remove('loading');
        submitBtn.textContent = 'MarlAnizar';
      }
    });
  </script>
</body>
</html>
