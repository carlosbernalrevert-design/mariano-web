<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rIAjoy - MarIAno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-color: #FFFDF9;
      --primary: #1E3A8A;
      --accent-yellow: #FEF08A;
      --accent-orange: #FF8A65;
      --accent-blue: #3B82F6;
      --card-bg: #FFFFFF;
      --text-main: #1E293B;
      --border-color: #E2E8F0;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      max-width: 680px;
      width: 100%;
      border-radius: 24px;
      padding: 40px 32px;
      box-shadow: 0 20px 40px rgba(30, 58, 138, 0.08);
      border: 3px solid #F1F5F9;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Franja superior festiva */
    .container::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 10px;
      background: linear-gradient(90deg, #3B82F6, #F59E0B, #10B981, #EC4899);
    }

    /* Caricatura estilo trazo sencillo / infantil */
    .rajoy-avatar {
      width: 120px;
      height: 120px;
      margin: 0 auto 10px auto;
    }

    .brand-title {
      font-family: 'Fredoka', sans-serif;
      font-size: 28px;
      color: var(--accent-blue);
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: 32px;
      color: var(--primary);
      line-height: 1.25;
      margin-bottom: 16px;
    }

    .subtitle {
      font-size: 18px;
      color: #475569;
      line-height: 1.5;
      margin-bottom: 32px;
    }

    .form-group {
      margin-bottom: 24px;
    }

    input[type="url"] {
      width: 100%;
      padding: 18px 20px;
      font-size: 16px;
      font-family: 'Nunito', sans-serif;
      border: 2px solid #CBD5E1;
      border-radius: 16px;
      outline: none;
      transition: all 0.2s ease;
      background-color: #F8FAFC;
      color: var(--text-main);
    }

    input[type="url"]:focus {
      border-color: var(--accent-blue);
      background-color: #FFFFFF;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
    }

    .btn-submit {
      width: 100%;
      background-color: var(--primary);
      color: #FFFFFF;
      font-family: 'Fredoka', sans-serif;
      font-size: 20px;
      padding: 16px;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.1s ease, background-color 0.2s ease;
      box-shadow: 0 4px 14px rgba(30, 58, 138, 0.25);
    }

    .btn-submit:hover {
      background-color: #2563EB;
      transform: translateY(-2px);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      background-color: #94A3B8;
      cursor: not-allowed;
      transform: none;
    }

    /* Área de Resultados */
    .result-box {
      margin-top: 32px;
      text-align: left;
      display: none;
      background: #EFF6FF;
      border: 2px solid #BFDBFE;
      border-radius: 18px;
      padding: 24px;
      animation: fadeIn 0.3s ease-in-out;
    }

    .result-header {
      font-family: 'Fredoka', sans-serif;
      font-size: 18px;
      color: #1E40AF;
      margin-bottom: 14px;
      background: var(--accent-yellow);
      display: inline-block;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #FDE047;
    }

    .result-content {
      font-size: 16px;
      line-height: 1.6;
      color: #1E293B;
      white-space: pre-wrap;
    }

    .error-box {
      margin-top: 24px;
      padding: 16px;
      background-color: #FEF2F2;
      border: 2px solid #FECACA;
      color: #991B1B;
      border-radius: 12px;
      display: none;
      font-weight: 600;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    
    <!-- Caricatura sencilla de Mariano Rajoy (SVG vectorial) -->
    <svg class="rajoy-avatar" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- Cabeza -->
      <circle cx="50" cy="45" r="32" fill="#FDE68A" stroke="#1E293B" stroke-width="3"/>
      <!-- Cabello canoso -->
      <path d="M 20 40 C 20 20, 80 20, 80 40 C 70 25, 30 25, 20 40 Z" fill="#E2E8F0" stroke="#1E293B" stroke-width="2.5"/>
      <!-- Ojos -->
      <circle cx="38" cy="40" r="3" fill="#1E293B"/>
      <circle cx="62" cy="40" r="3" fill="#1E293B"/>
      <!-- Gafas cuadradas estilo infantil -->
      <rect x="28" y="32" width="20" height="15" rx="3" stroke="#1E293B" stroke-width="3" fill="none"/>
      <rect x="52" y="32" width="20" height="15" rx="3" stroke="#1E293B" stroke-width="3" fill="none"/>
      <line x1="48" y1="39" x2="52" y2="39" stroke="#1E293B" stroke-width="3"/>
      <!-- Nariz -->
      <path d="M 50 42 L 47 50 L 52 50" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <!-- Barba característica -->
      <path d="M 32 55 C 32 68, 68 68, 68 55 C 65 64, 35 64, 32 55 Z" fill="#94A3B8" stroke="#1E293B" stroke-width="2"/>
      <!-- Boca sonriente -->
      <path d="M 40 58 Q 50 63 60 58" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round" fill="none"/>
      <!-- Hombros / Traje -->
      <path d="M 18 88 C 25 72, 75 72, 82 88" stroke="#1E293B" stroke-width="3" fill="#3B82F6"/>
      <!-- Corbata -->
      <polygon points="50,73 46,88 54,88" fill="#EF4444" stroke="#1E293B" stroke-width="1.5"/>
    </svg>

    <div class="brand-title">MarIAno</div>
    <h1>La herramienta que aclara lo que ya estaba claro, y que además lo vuelve a aclarar por si fuera necesario, o no.</h1>
    
    <p class="subtitle">Trae un link cualquiera y <i>MarIAno</i> te convierte la información en una columna que entendería un niño de 5 años.</p>

    <form id="marIAnoForm">
      <div class="form-group">
        <input 
          type="url" 
          id="newsUrl" 
          placeholder="Pega el link de tu noticia para MarIAnizar" 
          required 
          autocomplete="off"
        />
      </div>
      <button type="submit" id="submitBtn" class="btn-submit">MarlAnizar</button>
    </form>

    <div id="errorBox" class="error-box"></div>

    <div id="resultBox" class="result-box">
      <div id="resultHeader" class="result-header"></div>
      <div id="resultContent" class="result-content"></div>
    </div>

  </div>

  <script>
    const form = document.getElementById('marIAnoForm');
    const input = document.getElementById('newsUrl');
    const submitBtn = document.getElementById('submitBtn');
    const resultBox = document.getElementById('resultBox');
    const resultHeader = document.getElementById('resultHeader');
    const resultContent = document.getElementById('resultContent');
    const errorBox = document.getElementById('errorBox');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const url = input.value.trim();
      if (!url) return;

      // Reset de estados
      errorBox.style.display = 'none';
      resultBox.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'pensando en obviedades';

      try {
        const response = await fetch('/transformar', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Ocurrió un error inesperado.');
        }

        resultHeader.textContent = data.header || '';
        resultContent.textContent = data.content || '';
        resultBox.style.display = 'block';

      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'MarlAnizar';
      }
    });
  </script>
</body>
</html>
